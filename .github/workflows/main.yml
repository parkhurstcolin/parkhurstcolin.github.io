name: Keep Supabase Alive

on:
  schedule:
    # Run at midnight (0 0 * *) on Sunday (0) and Friday(5)
    - cron: '0 0 * * 0,5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
            echo "Response:"
            curl -fsS -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/projects?select=id&limit=1" \
              -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
